<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Call Data</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
        .spinner-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
        }
        .filter-container {
            margin-bottom: 1.5rem;
        }
        .modal-content {
            border-radius: 10px;
        }
        .modal-header {
            border-bottom: 1px solid #eaeaea;
        }
        .modal-footer {
            border-top: 1px solid #eaeaea;
        }
        .quick-selections {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        .btn-sm {
            height: 38px;
            font-size: 14px;
        }
    </style>
</head>
<body class="bg-light">
    <div class="container py-4">
        <h1 class="display-6 fw-bold mb-4">Client Call Data</h1>
        <div id="loading" class="spinner-container d-none">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
        <div class="filter-container">
            <div class="row g-3">
                <div class="col-md-3">
                    <label for="openDateModal" class="form-label">Date Range</label>
                    <button id="openDateModal" class="btn btn-outline-primary btn-sm w-100">Select Date Range</button>
                </div>
                <div class="col-md-2">
                    <label for="statusFilter" class="form-label">Status</label>
                    <select id="statusFilter" class="form-select">
                        <option value="">All Statuses</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label for="answerNameFilter" class="form-label">Answer Name</label>
                    <select id="answerNameFilter" class="form-select">
                        <option value="">All Answer Names</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label for="targetNameFilter" class="form-label">Target Name</label>
                    <select id="targetNameFilter" class="form-select">
                        <option value="">All Target Names</option>
                    </select>
                </div>
                <div class="col-md-3 d-flex align-items-end gap-2">
                    <button id="applyFilters" class="btn btn-primary w-100">Apply</button>
                    <button id="clearFilters" class="btn btn-secondary w-100">Clear</button>
                </div>
            </div>
            <div class="mt-3">
                <strong>Total Records: <span id="totalRecords">0</span></strong>
            </div>
        </div>
        <table id="data-table" class="table table-bordered table-striped table-hover d-none">
            <thead class="table-light">
                <tr>
                    <th scope="col">Call ID</th>
                    <th scope="col">Date</th>
                    <th scope="col">Caller Number</th>
                    <th scope="col">Target Name</th>
                    <th scope="col">Target Number</th>
                    <th scope="col">Answer Name</th>
                    <th scope="col">Answer Number</th>
                    <th scope="col">Duration (s)</th>
                    <th scope="col">Status</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
        <div id="pagination" class="d-flex justify-content-between align-items-center mt-4"></div>
    </div>

    <!-- Date Selection Modal -->
    <div class="modal fade" id="dateSelectionModal" tabindex="-1" aria-labelledby="dateSelectionModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="dateSelectionModalLabel">Select Date Range</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="modalDateRange" class="form-label">Date Range</label>
                        <input type="text" id="modalDateRange" class="form-control" placeholder="Select date range">
                    </div>
                    <div class="quick-selections">
                        <button class="btn btn-outline-primary btn-sm" data-range="thisWeek">This Week</button>
                        <button class="btn btn-outline-primary btn-sm" data-range="lastWeek">Last Week</button>
                        <button class="btn btn-outline-primary btn-sm" data-range="last7Days">Last 7 Days</button>
                        <button class="btn btn-outline-primary btn-sm" data-range="thisMonth">This Month</button>
                        <button class="btn btn-outline-primary btn-sm" data-range="lastMonth">Last Month</button>
                        <button class="btn btn-outline-primary btn-sm" data-range="thisYear">This Year</button>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="clearFilter">Clear Filter</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script>
        // Define constants and global variables
        const recordsPerPage = 10;
        let currentPage = 1;
        const LAMBDA_BASE_URL = 'https://riedh3l031.execute-api.ap-southeast-1.amazonaws.com';
        const LAMBDA_API_KEY  = '2d291f00-5145-4a2d-b1d8-ff13fd661f28';

        let callData = [];
        let configData = {};
        let filteredData = [];
        let selectedStartDate = null;
        let selectedEndDate = null;
        let dateRangePicker;

        // Normalize string for consistent comparison
        function normalizeString(str) {
            if (!str || str === 'N/A') return str;
            return str.trim().toLowerCase();
        }

        // Load configuration from Lambda
        async function loadConfig() {
            const urlParams = new URLSearchParams(window.location.search);
            const locationId = urlParams.get('locationId');
            if (!locationId) {
                document.getElementById('loading').textContent = 'Error: No locationId provided in URL.';
                return;
            }
            try {
                const res = await fetch(`${LAMBDA_BASE_URL}/config?locationId=${locationId}`, {
                    headers: { 'X-Api-Key': LAMBDA_API_KEY }
                });
                if (!res.ok) throw new Error(`Config error: ${res.status}`);
                configData = await res.json();
                initializeWithLocationId(configData);
            } catch (error) {
                console.error('Error loading config:', error);
                document.getElementById('loading').textContent = 'Error: Unable to load config.';
            }
        }

        // Initialize based on locationId from URL
        function initializeWithLocationId(client) {
            const accounts = client.callClientIds || [];
            if (!accounts.length) {
                document.getElementById('loading').textContent = 'Error: No call accounts configured for this location.';
                return;
            }

            // Set earliest date_from as minDate for date picker
            const minDate = accounts.reduce((earliest, account) => {
                const accountDate = new Date(account.date_from);
                return earliest ? (accountDate < earliest ? accountDate : earliest) : accountDate;
            }, null);
            selectedStartDate = minDate;
            selectedEndDate = new Date();
            updateDateRangeButton();
            initializeDatePicker(minDate);
            fetchAllClientData(client);

            // Background refresh every 5 minutes
            // const BACKGROUND_REFRESH_INTERVAL = 5 * 60 * 1000;
            // setInterval(() => {
            //     const urlParams = new URLSearchParams(window.location.search);
            //     const locationId = urlParams.get('locationId');
            //     const client = configData.clients.find(c => c.locationId === locationId);
            //     if (client) {
            //         fetchAllClientData(client);
            //     }
            // }, BACKGROUND_REFRESH_INTERVAL);
        }

        // Initialize Flatpickr date picker
        function initializeDatePicker(minDate) {
            dateRangePicker = flatpickr('#modalDateRange', {
                mode: "range",
                dateFormat: "Y/m/d",
                minDate: minDate,
                defaultDate: [selectedStartDate, selectedEndDate],
                onClose: (dates) => {
                    if (dates.length === 2) {
                        selectedStartDate = dates[0];
                        selectedEndDate = dates[1];
                        updateDateRangeButton();
                        applyFilters();
                        bootstrap.Modal.getInstance(document.getElementById('dateSelectionModal')).hide();
                    }
                }
            });
        }

        // Format date to YYYY/MM/DD
        function formatDate(date) {
            if (!date) return '';
            return date.toISOString().split('T')[0].replace(/-/g, '/');
        }

        // Update date range button text
        function updateDateRangeButton() {
            const button = document.getElementById('openDateModal');
            if (selectedStartDate && selectedEndDate) {
                button.textContent = `${formatDate(selectedStartDate)} - ${formatDate(selectedEndDate)}`;
            } else {
                button.textContent = 'Select Date Range';
            }
        }

        // Get date range for quick selection buttons
        function getDateRange(range) {
            const today = new Date();
            let start, end;
            switch (range) {
                case 'thisWeek':
                    start = new Date(today);
                    start.setDate(today.getDate() - today.getDay());
                    end = new Date(start);
                    end.setDate(start.getDate() + 6);
                    break;
                case 'lastWeek':
                    start = new Date(today);
                    start.setDate(today.getDate() - today.getDay() - 7);
                    end = new Date(start);
                    end.setDate(start.getDate() + 6);
                    break;
                case 'last7Days':
                    start = new Date(today);
                    start.setDate(today.getDate() - 7);
                    end = new Date(today);
                    break;
                case 'thisMonth':
                    start = new Date(today.getFullYear(), today.getMonth(), 1);
                    end = new Date(today.getFullYear(), today.getMonth() + 1, 0);
                    break;
                case 'lastMonth':
                    start = new Date(today.getFullYear(), today.getMonth() - 1, 1);
                    end = new Date(today.getFullYear(), today.getMonth(), 0);
                    break;
                case 'thisYear':
                    start = new Date(today.getFullYear(), 0, 1);
                    end = new Date(today.getFullYear(), 11, 31);
                    break;
                default:
                    start = null;
                    end = null;
            }
            // Ensure start date is not before minDate
            const accounts = configData.callClientIds || [];
            const minDate = accounts.reduce((earliest, account) => {
                const accountDate = new Date(account.date_from);
                return earliest ? (accountDate < earliest ? accountDate : earliest) : accountDate;
            }, null);
            if (start && start < minDate) {
                start = minDate;
            }
            return { start, end };
        }

        // Clear all filters and reset to defaults
        function clearFilters() {
            const accounts = configData.callClientIds || [];
            if (accounts.length) {
                const minDate = accounts.reduce((earliest, account) => {
                    const accountDate = new Date(account.date_from);
                    return earliest ? (accountDate < earliest ? accountDate : earliest) : accountDate;
                }, null);
                selectedStartDate = minDate;
                selectedEndDate = new Date();
                dateRangePicker.setDate([selectedStartDate, selectedEndDate]);
                document.getElementById('statusFilter').value = '';
                document.getElementById('answerNameFilter').value = '';
                document.getElementById('targetNameFilter').value = '';
                updateDateRangeButton();
                applyFilters();
            }
        }

        // Fetch data for all client IDs associated with the client
        async function fetchAllClientData(client) {
            const loading = document.getElementById('loading');
            loading.classList.remove('d-none');
            callData = [];

            const accounts = client.callClientIds || [];
            const promises = accounts.map(account =>
                fetchDataForClientId(client.locationId, account.clientid, account.date_from)
            );

            try {
                const results = await Promise.all(promises);
                callData = results.flat().sort((a, b) => new Date(b.date) - new Date(a.date));
                filteredData = callData;
                populateStatusFilter();
                populateAnswerNameFilter();
                populateTargetNameFilter();
                applyFilters();
            } catch (error) {
                console.error('Error fetching data:', error);
                loading.textContent = 'Error: Unable to fetch data. Ensure the PHP proxy (proxy.php) is correctly set up on your server.';
            } finally {
                loading.classList.add('d-none');
            }
        }

        // Fetch data for a single client ID
        async function fetchDataForClientId(locationId, clientId, dateFrom) {
            const apiUrl = `${LAMBDA_BASE_URL}/call/cdr?locationId=${locationId}&clientId=${clientId}&dateFrom=${encodeURIComponent(dateFrom)}`;
            const response = await fetch(apiUrl, {
                method: 'GET',
                headers: { 'X-Api-Key': LAMBDA_API_KEY }
            });
            if (!response.ok) {
                throw new Error(`HTTP error for client ID ${clientId}! Status: ${response.status}`);
            }
            const data = await response.json();
            return data.calls || [];
        }

        // Populate status filter dropdown
        function populateStatusFilter() {
            const statusFilter = document.getElementById('statusFilter');
            const statuses = [...new Set(callData.map(record => record.status_name))];
            statusFilter.innerHTML = '<option value="">All Statuses</option>';
            statuses.forEach(status => {
                const option = document.createElement('option');
                option.value = status;
                option.textContent = status;
                statusFilter.appendChild(option);
            });
        }

        // Populate answer name filter dropdown
        function populateAnswerNameFilter() {
            const answerNameFilter = document.getElementById('answerNameFilter');
            const answerNames = [...new Set(callData.map(record => record.answer_name).filter(name => name && name !== 'N/A'))];
            answerNameFilter.innerHTML = '<option value="">All Answer Names</option>';
            answerNames.forEach(name => {
                const option = document.createElement('option');
                option.value = name;
                option.textContent = name;
                answerNameFilter.appendChild(option);
            });
        }

        // Populate target name filter dropdown with normalized names
        function populateTargetNameFilter() {
            const targetNameFilter = document.getElementById('targetNameFilter');
            // Normalize target names and create a map to preserve original display text
            const targetNameMap = new Map();
            callData.forEach(record => {
                const originalName = record.target_name;
                if (originalName && originalName !== 'N/A') {
                    const normalizedName = normalizeString(originalName);
                    // Store the first encountered original name for each normalized name
                    if (!targetNameMap.has(normalizedName)) {
                        targetNameMap.set(normalizedName, originalName);
                    }
                }
            });

            // Populate dropdown with original names, but use normalized names for filtering
            targetNameFilter.innerHTML = '<option value="">All Target Names</option>';
            [...targetNameMap.entries()].sort((a, b) => a[1].localeCompare(b[1])).forEach(([normalizedName, originalName]) => {
                const option = document.createElement('option');
                option.value = normalizedName; // Use normalized name for filtering
                option.textContent = originalName; // Display original name
                targetNameFilter.appendChild(option);
            });
        }

        // Apply filters to data
        function applyFilters() {
            const statusFilter = document.getElementById('statusFilter').value;
            const answerNameFilter = document.getElementById('answerNameFilter').value;
            const targetNameFilter = document.getElementById('targetNameFilter').value;
            const dateFrom = selectedStartDate ? formatDate(selectedStartDate) : null;
            const dateTo = selectedEndDate ? formatDate(selectedEndDate) : null;

            filteredData = callData.filter(record => {
                let include = true;
                if (statusFilter) {
                    include = include && record.status_name === statusFilter;
                }
                if (answerNameFilter) {
                    include = include && record.answer_name === answerNameFilter;
                }
                if (targetNameFilter) {
                    include = include && normalizeString(record.target_name) === targetNameFilter;
                }
                if (dateFrom && dateTo) {
                    const recordDate = new Date(record.date.replace(/\//g, '-'));
                    include = include && recordDate >= new Date(dateFrom.replace(/\//g, '-')) && recordDate <= new Date(dateTo.replace(/\//g, '-'));
                }
                return include;
            });

            document.getElementById('totalRecords').textContent = filteredData.length;
            displayPage(1);
        }

        // Display paginated data
        function displayPage(page) {
            const table = document.getElementById('data-table');
            const tableBody = document.getElementById('table-body');
            const pagination = document.getElementById('pagination');
            table.classList.remove('d-none');

            const start = (page - 1) * recordsPerPage;
            const end = start + recordsPerPage;
            const paginatedData = filteredData.slice(start, end);

            tableBody.innerHTML = '';
            paginatedData.forEach(record => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${record.id || 'N/A'}</td>
                    <td>${record.date || 'N/A'}</td>
                    <td>${record.caller_number || 'N/A'}</td>
                    <td>${record.target_name || 'N/A'}</td>
                    <td>${record.target_number || 'N/A'}</td>
                    <td>${record.answer_name || 'N/A'}</td>
                    <td>${record.answer_number || 'N/A'}</td>
                    <td>${record.duration || 'N/A'}</td>
                    <td>${record.status_name || 'N/A'}</td>
                `;
                tableBody.appendChild(row);
            });

            const totalPages = Math.ceil(filteredData.length / recordsPerPage);
            pagination.innerHTML = `
                <button onclick="changePage(${page - 1})" ${page === 1 ? 'disabled' : ''} class="btn btn-primary ${page === 1 ? 'disabled' : ''}">Previous</button>
                <span>Page ${page} of ${totalPages}</span>
                <button onclick="changePage(${page + 1})" ${page === totalPages ? 'disabled' : ''} class="btn btn-primary ${page === totalPages ? 'disabled' : ''}">Next</button>
            `;
        }

        // Change page
        function changePage(page) {
            const totalPages = Math.ceil(filteredData.length / recordsPerPage);
            if (page >= 1 && page <= totalPages) {
                currentPage = page;
                displayPage(page);
            }
        }

        // Initialize event listeners
        $(document).ready(function() {
            $('#openDateModal').on('click', () => {
                const modal = new bootstrap.Modal(document.getElementById('dateSelectionModal'));
                modal.show();
            });

            $('.quick-selections button').each(function() {
                $(this).on('click', function() {
                    const range = this.dataset.range;
                    const dates = getDateRange(range);
                    dateRangePicker.setDate([dates.start, dates.end]);
                    selectedStartDate = dates.start;
                    selectedEndDate = dates.end;
                    updateDateRangeButton();
                    applyFilters();
                    bootstrap.Modal.getInstance(document.getElementById('dateSelectionModal')).hide();
                });
            });

            $('#clearFilter').on('click', () => {
                dateRangePicker.clear();
                selectedStartDate = null;
                selectedEndDate = null;
                updateDateRangeButton();
                applyFilters();
                bootstrap.Modal.getInstance(document.getElementById('dateSelectionModal')).hide();
            });

            $('#applyFilters').on('click', applyFilters);
            $('#clearFilters').on('click', clearFilters);
        });

        loadConfig();
    </script>
</body>
</html>
