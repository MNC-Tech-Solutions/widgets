<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexCRM to GHL Debug Bridge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chat-container::-webkit-scrollbar { width: 4px; }
        .chat-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .active-card { border-color: #6366f1; background-color: #f8fafc; ring: 2px; ring-color: #6366f1; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 lg:p-8 font-sans text-slate-900">

    <div class="max-w-[1500px] mx-auto space-y-6">
        <header class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold tracking-tight">Nex-to-GHL Bridge <span class="text-xs font-mono bg-amber-100 text-amber-700 px-2 py-0.5 rounded ml-2 uppercase">Debug Mode</span></h1>
                <p class="text-xs text-slate-500 mt-1">Check console (F12) for detailed logs</p>
            </div>
            <div id="authStatus" class="px-3 py-1.5 rounded-lg bg-slate-100 text-slate-400 text-[10px] font-black uppercase tracking-widest border border-slate-200">
                Nexus Offline
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="font-bold text-slate-800 mb-6 flex items-center gap-2">
                    <span class="bg-slate-800 text-white w-5 h-5 rounded-full flex items-center justify-center text-[10px]">1</span>
                    Step 1: Contact Discovery
                </h2>
                
                <button onclick="handleAuth()" id="authBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl transition mb-6 shadow-lg shadow-indigo-100">
                    Connect NexCRM
                </button>

                <div class="space-y-4 border-t border-slate-100 pt-6">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Global Search</label>
                    <input id="contactSearchQuery" type="text" placeholder="Name, Phone, or Email..." 
                           class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                    <button onclick="searchNexContacts()" id="searchBtn" class="w-full bg-slate-800 hover:bg-black text-white py-3 rounded-xl font-bold transition text-sm">
                        Search Contacts
                    </button>
                </div>

                <div id="contactList" class="mt-6 space-y-2 max-h-[400px] overflow-y-auto hidden">
                    </div>
            </section>

            <section id="convSection" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 opacity-40 pointer-events-none flex flex-col h-[700px]">
                <h2 class="font-bold text-slate-800 mb-4 flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <span class="bg-slate-800 text-white w-5 h-5 rounded-full flex items-center justify-center text-[10px]">2</span>
                        Conversation Feed
                    </div>
                    <span id="msgCount" class="text-[10px] bg-indigo-50 text-indigo-600 px-2 py-1 rounded font-bold uppercase">0 Msg</span>
                </h2>

                <div class="grid grid-cols-2 gap-2 mb-4">
                    <input id="startDate" type="date" value="2023-01-01" class="p-2 border border-slate-200 rounded-lg text-[10px] font-mono">
                    <input id="endDate" type="date" value="2026-12-31" class="p-2 border border-slate-200 rounded-lg text-[10px] font-mono">
                </div>

                <div id="chatWindow" class="chat-container flex-1 overflow-y-auto bg-slate-50 rounded-xl p-4 flex flex-col space-y-3 border border-slate-100">
                    <p class="m-auto text-[10px] uppercase font-bold text-slate-300 tracking-tighter">Waiting for contact...</p>
                </div>
            </section>

            <section id="ghlSection" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 opacity-40 pointer-events-none flex flex-col h-fit">
                <h2 class="font-bold text-slate-800 mb-6 flex items-center gap-2">
                    <span class="bg-green-600 text-white w-5 h-5 rounded-full flex items-center justify-center text-[10px]">3</span>
                    Step 3: GHL Migration
                </h2>

                <div id="syncProgress" class="hidden mb-6 p-4 bg-indigo-50 border border-indigo-100 rounded-xl">
                    <div class="flex justify-between text-[10px] font-bold text-indigo-600 mb-2">
                        <span id="syncStatusText">Ready...</span>
                        <span id="syncPercent">0%</span>
                    </div>
                    <div class="w-full bg-white rounded-full h-1.5 border border-indigo-100">
                        <div id="syncBar" class="bg-indigo-600 h-1.5 rounded-full transition-all duration-300" style="width: 0%"></div>
                    </div>
                </div>

                <button onclick="startGHLMigration()" id="syncBtn" class="w-full bg-green-600 hover:bg-green-700 text-white py-4 rounded-xl font-bold shadow-lg shadow-green-100 transition">
                    Push to GoHighLevel
                </button>
            </section>
        </div>
    </div>

    <script>
        const AUTH = {
            clientId: "bda337e5a7519be61e3a1b127688fd1f",
            clientSecret: "995c8a37-1be2-44ee-b1a4-77b0e74d5d19",
            ghlToken: "pit-a0089695-3fb5-4dcd-8659-f41c038f6611",
            locationId: "e9bA8duUxZTuI4HbWSaY"
        };

        let state = {
            nexAccessToken: null,
            nexRefreshToken: null,
            selectedProspectToken: null,
            activeContactData: null,
            conversationMessages: []
        };



        // --- 0. AUTH FLOW ---
        async function handleAuth() {
            console.log("--- STARTING NEXCRM AUTH ---");
            const btn = document.getElementById('authBtn');
            const status = document.getElementById('authStatus');
            btn.innerText = "Connecting...";

            try {
                // Get Refresh Token
                console.log("Step 0.1: Getting Refresh Token...");
                const r1 = await fetch(`https://www.nexcrmapis.com/cloud/conversationapis/v1/oauth_login?client_id=${AUTH.clientId}&client_secret=${AUTH.clientSecret}`);
                const d1 = await r1.json();
                state.nexRefreshToken = d1.refresh_token;
                console.log("SUCCESS: Refresh Token Received:", state.nexRefreshToken);

                // Get Access Token
                console.log("Step 0.2: Getting Access Token...");
                const r2 = await fetch(`https://www.nexcrmapis.com/cloud/conversationapis/v1/oauth_access?refresh_token=${state.nexRefreshToken}&client_id=${AUTH.clientId}`);
                const d2 = await r2.json();
                state.nexAccessToken = d2.access_token;
                console.log("SUCCESS: Access Token Received:", state.nexAccessToken);

                status.innerText = "Connected";
                status.className = "px-3 py-1.5 rounded-lg bg-green-50 text-green-600 text-[10px] font-black border border-green-200 uppercase tracking-widest";
                btn.innerText = "Connection Active ✅";
                btn.className = "w-full bg-slate-100 text-slate-400 font-bold py-3 rounded-xl cursor-default";
            } catch (e) {
                console.error("AUTH ERROR:", e);
                alert("Auth Failed. Check console for details.");
            }
        }

        // --- 1. SEARCH CONTACTS ---
        async function searchNexContacts() {
            if (!state.nexAccessToken) return alert("Connect NexCRM first.");
            const query = document.getElementById('contactSearchQuery').value;
            const list = document.getElementById('contactList');
            const btn = document.getElementById('searchBtn');

            console.log(`--- POSTMAN-STYLE BYPASS INITIATED ---`);
            btn.innerText = "Searching...";
            
            const payload = {
                limit: 5,
                page: 1,
                label: "",
                search: query
            };

            // We use a public proxy to bypass the browser's strict GET/BODY restriction.
            // NOTE: You must visit this URL once and click "Request temporary access" 
            // to enable it for your browser: https://cors-anywhere.herokuapp.com/
            const proxy = "https://cors-anywhere.herokuapp.com/";
            const targetUrl = 'https://www.nexcrmapis.com/cloud/conversationapis/v1/contacts';

            try {
                console.log("Attempting fetch via Proxy to allow GET body...");
                
                const res = await fetch(proxy + targetUrl, {
                    method: 'GET', // The proxy will forward this GET + Body
                    headers: { 
                        'Authorization': `Bearer ${state.nexAccessToken}`, 
                        'Content-Type': 'application/json',
                        'X-Requested-With': 'XMLHttpRequest'
                    },
                    body: JSON.stringify(payload) 
                });
                
                const result = await res.json();
                console.log("Success! Proxy Response:", result);

                if (result.data && Array.isArray(result.data)) {
                    displayResults(result.data);
                } else {
                    throw new Error("Invalid data format");
                }
            } catch (e) { 
                console.warn("Proxy failed or GET body blocked. Falling back to URL parameters...");
                
                // FALLBACK: Convert body to URL parameters (The Browser-Safe way)
                const params = new URLSearchParams({
                    limit: 5,
                    page: 1,
                    search: query
                });

                try {
                    const fallbackRes = await fetch(`${targetUrl}?${params.toString()}`, {
                        method: 'GET',
                        headers: { 
                            'Authorization': `Bearer ${state.nexAccessToken}`,
                            'Content-Type': 'application/json'
                        }
                    });
                    const fallbackResult = await fallbackRes.json();
                    console.log("Fallback URL Param Response:", fallbackResult);
                    displayResults(fallbackResult.data);
                } catch (fallbackError) {
                    console.error("Critical Error:", fallbackError);
                    list.innerHTML = `<p class="text-xs text-red-500 p-4">Both Proxy and Direct fetch failed. Check Console.</p>`;
                }
            } finally {
                btn.innerText = "Search Contacts";
            }
        }

        function displayResults(data) {
            const list = document.getElementById('contactList');
            list.innerHTML = "";
            list.classList.remove('hidden');
            
            if (!data || data.length === 0) {
                list.innerHTML = `<p class="text-xs text-slate-400 p-4">No results.</p>`;
                return;
            }

            data.forEach(contact => {
                const div = document.createElement('div');
                div.className = "p-3 border border-slate-100 rounded-xl cursor-pointer hover:border-indigo-300 hover:bg-indigo-50 transition text-left";
                div.innerHTML = `
                    <p class="text-sm font-bold text-slate-700">${contact.name || 'Unknown'}</p>
                    <p class="text-[10px] text-slate-400 font-mono">${contact.phone || contact.contact} | ${contact.email || ''}</p>
                `;
                div.onclick = () => selectContact(contact, div);
                list.appendChild(div);
            });
        }

        function selectContact(contact, element) {
            console.log("--- NEW CONTACT SELECTED: RESETTING UI ---");
            
            // 1. Reset selection styling
            document.querySelectorAll('#contactList div').forEach(el => el.classList.remove('active-card', 'border-indigo-600'));
            element.classList.add('active-card', 'border-indigo-600');
            
            // 2. Reset the Sync Button and Progress Bar
            const btn = document.getElementById('syncBtn');
            btn.disabled = false;
            btn.innerText = "Start Migration";
            btn.className = "w-full bg-green-600 hover:bg-green-700 text-white py-4 rounded-xl font-bold transition";
            
            document.getElementById('syncProgress').classList.add('hidden');
            document.getElementById('syncBar').style.width = "0%";
            
            // 3. Update state and load conversation
            state.selectedProspectToken = contact.prospect_token;
            state.activeContactData = contact;
            
            document.getElementById('convSection').classList.remove('opacity-40', 'pointer-events-none');
            fetchConversation();
        }

        // --- 2. GET CONVERSATION ---
        async function fetchConversation() {
            console.log("--- FETCHING CONVERSATION ---");
            const chatWin = document.getElementById('chatWindow');
            chatWin.innerHTML = `<p class="m-auto text-[10px] font-bold text-slate-400 uppercase">Loading feed...</p>`;

            const body = {
                limit: "50", page: "1",
                start_date: document.getElementById('startDate').value,
                end_date: document.getElementById('endDate').value,
                prospect_token: state.selectedProspectToken
            };
            console.log("Conversation Request Body:", body);

            try {
                const res = await fetch('https://www.nexcrmapis.com/cloud/conversationapis/v1/conversations', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${state.nexAccessToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const result = await res.json();
                console.log("Conversation API Response:", result);
                
                state.conversationMessages = result.data[0]?.message || [];
                renderMessages();
                document.getElementById('ghlSection').classList.remove('opacity-40', 'pointer-events-none');
            } catch (e) { console.error("FETCH CONV ERROR:", e); }
        }

        function renderMessages() {
            const chatWin = document.getElementById('chatWindow');
            chatWin.innerHTML = "";
            document.getElementById('msgCount').innerText = `${state.conversationMessages.length} MSGS`;

            state.conversationMessages.forEach(m => {
                const isOut = m.direction === 'outbound';
                const div = document.createElement('div');
                div.className = `max-w-[85%] p-3 rounded-2xl text-xs shadow-sm ${isOut ? 'self-end bg-indigo-600 text-white rounded-tr-none' : 'self-start bg-white border border-slate-200 text-slate-700 rounded-tl-none'}`;
                div.innerHTML = `<p>${m.text}</p><span class="text-[8px] opacity-40 block mt-1 font-mono uppercase tracking-tighter">${m.timestamp}</span>`;
                chatWin.appendChild(div);
            });
            chatWin.scrollTop = chatWin.scrollHeight;
        }

        // --- 3. GHL SYNC ---
        async function startGHLMigration() {
            console.log("--- STARTING GHL MIGRATION ---");
            const btn = document.getElementById('syncBtn');
            btn.disabled = true;
            document.getElementById('syncProgress').classList.remove('hidden');

            try {
                // 4a. Create/Get Contact (Using "-" for empty names)
                updateProgress("Checking GHL Contact...", 10);
                const contactId = await upsertGHLContact();

                // 4b. Create/Get Conversation
                updateProgress("Linking Thread...", 25);
                const convId = await createGHLConversation(contactId);

                // 4c. Push Messages
                for (let i = 0; i < state.conversationMessages.length; i++) {
                    const pc = 25 + Math.round(((i + 1) / state.conversationMessages.length) * 75);
                    updateProgress(`Syncing ${i+1}/${state.conversationMessages.length}`, pc);
                    
                    await pushGHLMessage(state.conversationMessages[i], contactId, convId);
                }

                updateProgress("Success!", 100);
                btn.innerText = "Migration Complete ✅";
                btn.className = "w-full bg-slate-900 text-white py-4 rounded-xl font-bold cursor-default";

            } catch (e) { 
                console.error("GHL SYNC ERROR:", e);
                alert("Sync failed: " + e.message); 
                btn.disabled = false;
                btn.innerText = "Retry Migration";
            }
        }

        // Helper to handle empty data based on your requirement
        const cleanValue = (val, fallback = null) => {
            return (val && val.trim() !== "") ? val : fallback;
        };

        async function upsertGHLContact() {
            console.log("--- GHL CONTACT STEP ---");
            
            // GHL requires at least firstName or lastName. 
            // We'll try to split the NexCRM name, or use "-" if empty.
            const fullName = state.activeContactData.name || "";
            const nameParts = fullName.trim().split(" ");
            const firstName = nameParts[0] || "-"; 
            const lastName = nameParts.slice(1).join(" ") || "-";

            const payload = {
                locationId: AUTH.locationId,
                firstName: cleanValue(firstName, "-"),
                lastName: cleanValue(lastName, "-"),
                name: cleanValue(fullName, "-"),
                phone: cleanValue(state.activeContactData.phone, "-"), // Try null first
                email: cleanValue(state.activeContactData.email, null)    // Try null first
            };

            console.log("GHL Contact Payload:", payload);

            const res = await fetch('https://services.leadconnectorhq.com/contacts/', {
                method: 'POST',
                headers: { 
                    'Authorization': `Bearer ${AUTH.ghlToken}`, 
                    'Version': '2021-07-28',
                    'Content-Type': 'application/json' 
                },
                body: JSON.stringify(payload)
            });

            const data = await res.json();
            console.log("GHL Contact Response:", data);

            // Handle Duplicate (400)
            if (res.status === 400 && data.meta && data.meta.contactId) {
                console.log("Match Found: Using existing Contact ID:", data.meta.contactId);
                return data.meta.contactId;
            }

            // Handle Success
            if (data.contact && data.contact.id) {
                return data.contact.id;
            }

            // If 422 or other error persists, throw to stop the sync
            throw new Error(data.message || "GHL rejected the contact data.");
        }

        async function createGHLConversation(contactId) {
            console.log("--- GHL CONVERSATION STEP ---");
            const res = await fetch('https://services.leadconnectorhq.com/conversations/', {
                method: 'POST',
                headers: { 
                    'Authorization': `Bearer ${AUTH.ghlToken}`, 
                    'Version': '2021-04-15',
                    'Content-Type': 'application/json' 
                },
                body: JSON.stringify({ locationId: AUTH.locationId, contactId: contactId })
            });
            
            const data = await res.json();
            console.log("GHL Conversation Response:", data);

            // GHL returns conversationId directly if it already exists
            return data.conversationId || (data.conversation && data.conversation.id);
        }

        async function pushGHLMessage(m, cid, cvid) {
            // Determine endpoint based on direction
            const endpoint = 'https://services.leadconnectorhq.com/conversations/messages/inbound';

            const body = { 
                type: "SMS", 
                conversationId: cvid, 
                contactId: cid, 
                message: m.text || "-", // Message text cannot be null in GHL
                direction: m.direction,
                date: new Date(m.timestamp).toISOString() 
            };

            const res = await fetch(endpoint, {
                method: 'POST',
                headers: { 
                    'Authorization': `Bearer ${AUTH.ghlToken}`, 
                    'Version': '2021-04-15',
                    'Content-Type': 'application/json' 
                },
                body: JSON.stringify(body)
            });

            const data = await res.json();
            if (!res.ok) console.error("Message Sync Failed:", data);
        }

        function updateProgress(txt, pc) {
            document.getElementById('syncStatusText').innerText = txt;
            document.getElementById('syncPercent').innerText = pc + "%";
            document.getElementById('syncBar').style.width = pc + "%";
        }
    </script>
</body>
</html>
