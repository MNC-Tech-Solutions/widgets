<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opportunities by User and Stage</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <style>
    :root {
      --primary: #3a86ff;
      --text: #374151;
      --border: #d1d5db;
    }

    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      margin: 0;
      padding: 10px;
      background: white;
    }

    .widget {
      max-width: 1000px;
      margin: 0 auto;
      padding: 10px;
      position: relative;
    }

    .table-container {
      overflow-x: auto;
    }

    .table {
      border-collapse: separate;
      border-spacing: 0;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      width: 100%;
      margin-bottom: 0;
    }

    .table thead th {
      background: #f8f9fa;
      color: var(--text);
      font-weight: 600;
      font-size: 12px;
      padding: 8px;
      border-bottom: 2px solid #e5e7eb;
      white-space: nowrap;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .table tbody tr {
      transition: background 0.2s ease;
    }

    .table tbody tr:hover {
      background: #f1f5f9;
    }

    .table tbody td {
      font-size: 12px;
      padding: 8px;
      border-top: 1px solid #e5e7eb;
      color: #4b5563;
      white-space: nowrap;
    }

    .table-container::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    .table-container::-webkit-scrollbar-track {
      background: #f1f5f9;
      border-radius: 5px;
    }

    .table-container::-webkit-scrollbar-thumb {
      background: #adb5bd;
      border-radius: 5px;
    }

    .table-container::-webkit-scrollbar-thumb:hover {
      background: #6b7280;
    }

    .pagination-section {
      margin-top: 10px;
      padding: 10px;
      background: #f8f9fa;
      border-radius: 6px;
      border: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .pagination-info {
      font-size: 12px;
      color: #6b7280;
    }

    .pagination-buttons .btn {
      padding: 5px 12px;
      font-size: 12px;
      font-weight: 500;
      border-radius: 4px;
      transition: all 0.2s ease;
    }

    .pagination-buttons .btn-outline-primary {
      border-color: var(--primary);
      color: var(--primary);
    }

    .pagination-buttons .btn-outline-primary:hover {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .pagination-buttons .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .spinner {
      width: 30px;
      height: 30px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .error-message {
      text-align: center;
      color: #e3342f;
      padding: 15px;
      font-size: 14px;
    }

    .download-button {
      margin-left: 10px;
    }
  </style>
</head>
<body>
  <div class="widget">
    <div class="table-container">
      <table class="table" id="opportunitiesTable">
        <thead>
          <tr id="tableHeader">
            <th>User</th>
            <!-- Stage columns populated dynamically -->
          </tr>
        </thead>
        <tbody id="tableBody">
          <!-- Populated dynamically -->
        </tbody>
      </table>
    </div>
    <div class="pagination-section" id="paginationSection" style="display: none;">
      <span class="pagination-info" id="paginationInfo">Showing 0 to 0 of 0</span>
      <div class="pagination-buttons">
        <button class="btn btn-outline-primary btn-sm me-2" id="prevPageBtn" disabled>Previous</button>
        <button class="btn btn-outline-primary btn-sm me-2" id="nextPageBtn" disabled>Next</button>
        <button class="btn btn-primary btn-sm download-button" id="downloadBtn">Download CSV</button>
      </div>
    </div>
    <div class="loading-overlay" id="loadingOverlay" style="display: flex;">
      <div class="spinner"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
  <script>
    // Global config object and location ID
    let CONFIG = {};
    let locationId = '';

    // Pagination variables
    let currentPage = 1;
    const itemsPerPage = 10;

    // Get location ID from query parameters or parent URL
    function getLocationId(fallbackLocationId) {
      try {
        // Check for locationId in the iframe's URL query parameters
        const urlParams = new URLSearchParams(window.location.search);
        const locationId = urlParams.get('locationId');
        if (locationId) {
          return locationId;
        }
        // Fallback to parent URL
        const parentUrl = window.parent.location.href;
        const match = parentUrl.match(/\/location\/([^/]+)\//);
        return match && match[1] ? match[1] : fallbackLocationId;
      } catch (e) {
        console.error('Error accessing location ID:', e);
        return fallbackLocationId;
      }
    }

    // Select config based on location ID
    function selectConfig(configs, locationId) {
      return configs.find(config => config.defaultLocationId === locationId) || {};
    }

    // Global variables
    let stages = [];
    let usersMap = new Map();
    let opportunities = [];
    let userRoles = new Map(); // Store user roles

    // Initialize widget on page load
    document.addEventListener('DOMContentLoaded', async function() {
      // Load config
      try {
        const response = await fetch('../config.json');
        if (!response.ok) throw new Error(`Failed to load config: ${response.status}`);
        const configs = await response.json();
        console.log('Configs loaded:', configs);

        // Get location ID and select config
        locationId = getLocationId(null); // No fallback location ID
        CONFIG = selectConfig(configs, locationId);
        console.log('Selected config for locationId:', locationId, CONFIG);

        // If no config is selected, handle empty state
        if (Object.keys(CONFIG).length === 0) {
          console.warn('No config found for locationId:', locationId);
          document.getElementById('tableBody').innerHTML = '<tr><td colspan="1" class="error-message">No configuration available for this location.</td></tr>';
          hideSpinner();
          return;
        }
      } catch (error) {
        console.error('Error loading config:', error);
        CONFIG = {};
        locationId = '';
        document.getElementById('tableBody').innerHTML = '<tr><td colspan="1" class="error-message">Error loading configuration. Please try again later.</td></tr>';
        hideSpinner();
        return;
      }

      await initWidget();
    });

    // Show/hide loading spinner
    function showSpinner() {
      document.getElementById('loadingOverlay').style.display = 'flex';
    }

    function hideSpinner() {
      document.getElementById('loadingOverlay').style.display = 'none';
    }

    // Initialize widget: fetch data and render table
    async function initWidget() {
      showSpinner();
      try {
        // Fetch data
        await fetchPipelinesV2();
        await fetchAllUsers();
        await fetchUserRoles(); // Fetch user roles
        opportunities = await fetchAllOpportunities();

        // Render table
        renderTable();

        // Set up pagination event listeners
        document.getElementById('prevPageBtn').addEventListener('click', () => {
          if (currentPage > 1) {
            currentPage--;
            renderTable();
          }
        });

        document.getElementById('nextPageBtn').addEventListener('click', () => {
          if (currentPage < Math.ceil(usersMap.size / itemsPerPage)) {
            currentPage++;
            renderTable();
          }
        });

        // Set up download button event listener
        document.getElementById('downloadBtn').addEventListener('click', downloadCSV);
      } catch (error) {
        console.error('Error initializing widget:', error);
        document.getElementById('tableBody').innerHTML = '<tr><td colspan="1" class="error-message">Error loading data. Please try again later.</td></tr>';
      } finally {
        hideSpinner();
      }
    }

    // Fetch pipelines (and stages) from v1 API
    async function fetchPipelinesV2() {
      try {
        const response = await fetch(`https://services.leadconnectorhq.com/opportunities/pipelines?locationId=${locationId}`, {
          headers: { 
              'Authorization': `Bearer ${CONFIG.accessToken}`, 
              'Version': '2021-07-28',
              'Content-Type': 'application/json',
          }
        });
        if (!response.ok) throw new Error(`HTTP error! Status: ${response.status}`);
        const data = await response.json();
        // Use the first pipeline's stages (or adjust if specific pipeline needed)
        stages = data.pipelines.length > 0 ? data.pipelines[0].stages : [];
        console.log('Stages fetched:', stages.length);
      } catch (error) {
        console.error('Error fetching pipelines/stages:', error);
        stages = [];
      }
    }

    // Fetch users from v1 API
    async function fetchAllUsers() {
      try {
        const response = await fetch(`https://services.leadconnectorhq.com/users/?locationId=${locationId}`, {
          headers: { 
              'Authorization': `Bearer ${CONFIG.accessToken}`, 
              'Version': '2021-07-28',
              'Content-Type': 'application/json',
          }
        });
        if (!response.ok) throw new Error(`HTTP error! Status: ${response.status}`);
        const data = await response.json();
        data.users.forEach(user => {
          usersMap.set(user.id, `${user.firstName} ${user.lastName}`.trim() || user.email);
        });
        console.log('Users fetched:', usersMap.size);
      } catch (error) {
        console.error('Error fetching users:', error);
      }
    }

    // Fetch user roles from users API
    async function fetchUserRoles() {
      try {
        const response = await fetch(`https://services.leadconnectorhq.com/users/?locationId=${locationId}`, {
          headers: {
            'Authorization': `Bearer ${CONFIG.accessToken}`,
            'Version': '2021-07-28',
            'Content-Type': 'application/json'
          }
        });
        if (!response.ok) {
          if (response.status === 404) {
            console.warn(`User data not found for locationId: ${locationId}. Displaying all users without admin filtering.`);
            return; // Continue without filtering admins
          }
          throw new Error(`HTTP error! Status: ${response.status}`);
        }
        const data = await response.json();
        data.users.forEach(user => {
          if (user.roles && user.roles.role) {
            userRoles.set(user.id, user.roles.role); // Map userId to role
          }
        });
        // Filter out admins from usersMap
        usersMap.forEach((name, userId) => {
          if (userRoles.get(userId)?.toLowerCase() === 'admin') {
            usersMap.delete(userId);
          }
        });
        console.log('Users after filtering admins:', usersMap.size);
      } catch (error) {
        console.error('Error fetching user roles:', error);
        console.warn('Proceeding without admin filtering due to error.');
      }
    }

    // Fetch opportunities from v2 API
    async function fetchAllOpportunities() {
      let allOpportunities = [];
      let startAfter = null;
      let startAfterId = null;
      let hasMore = true;
      const limit = 100;

      try {
        while (hasMore) {
          let url = `https://services.leadconnectorhq.com/opportunities/search?location_id=${locationId}&limit=${limit}`;
          if (startAfter && startAfterId) {
            url += `&startAfter=${startAfter}&startAfterId=${startAfterId}`;
          }

          const response = await fetch(url, {
            headers: { 'Authorization': `Bearer ${CONFIG.accessToken}`, 'Version': '2021-07-28', 'Content-Type': 'application/json' }
          });
          if (!response.ok) throw new Error(`HTTP error! Status: ${response.status}`);
          const data = await response.json();

          allOpportunities = allOpportunities.concat(data.opportunities);
          console.log('Fetched opportunities so far:', allOpportunities.length);

          startAfter = data.meta?.startAfter || null;
          startAfterId = data.meta?.startAfterId || null;
          hasMore = !!startAfter && !!startAfterId && allOpportunities.length < (data.meta?.total || 0);
        }
        console.log('Total opportunities fetched:', allOpportunities.length);
        return allOpportunities;
      } catch (error) {
        console.error('Error fetching opportunities:', error);
        return [];
      }
    }

    // Render the opportunities table
    function renderTable() {
      const tableHeader = document.getElementById('tableHeader');
      const tableBody = document.getElementById('tableBody');
      const paginationSection = document.getElementById('paginationSection');
      const paginationInfo = document.getElementById('paginationInfo');
      const prevBtn = document.getElementById('prevPageBtn');
      const nextBtn = document.getElementById('nextPageBtn');

      // Clear existing content
      tableHeader.innerHTML = '<th>User</th>';
      tableBody.innerHTML = '';

      // Add stage columns to header
      stages.forEach(stage => {
        const th = document.createElement('th');
        th.textContent = stage.name;
        tableHeader.appendChild(th);
      });

      // If no stages, show message
      if (stages.length === 0) {
        tableBody.innerHTML = '<tr><td colspan="1" class="error-message">No stages available.</td></tr>';
        paginationSection.style.display = 'none';
        return;
      }

      // Calculate opportunity counts per user and stage
      const opportunityCounts = new Map();
      usersMap.forEach((name, userId) => {
        opportunityCounts.set(userId, new Map(stages.map(s => [s.id, 0])));
      });

      opportunities.forEach(op => {
        const userId = op.assignedTo;
        const stageId = op.pipelineStageId;
        if (userId && stageId && opportunityCounts.has(userId) && opportunityCounts.get(userId).has(stageId)) {
          opportunityCounts.get(userId).set(stageId, opportunityCounts.get(userId).get(stageId) + 1);
        }
      });

      // Get users for the current page
      const userArray = Array.from(usersMap.entries());
      const startIndex = (currentPage - 1) * itemsPerPage;
      const endIndex = Math.min(startIndex + itemsPerPage, userArray.length);
      const paginatedUsers = userArray.slice(startIndex, endIndex);

      // Render table rows
      paginatedUsers.forEach(([userId, name]) => {
        const row = document.createElement('tr');
        row.innerHTML = `<td>${name}</td>`;
        stages.forEach(stage => {
          const count = opportunityCounts.get(userId).get(stage.id) || 0;
          row.innerHTML += `<td>${count}</td>`;
        });
        tableBody.appendChild(row);
      });

      // Update pagination
      const totalItems = userArray.length;
      paginationSection.style.display = totalItems > 0 ? 'flex' : 'none';
      paginationInfo.textContent = `Showing ${startIndex + 1} to ${endIndex} of ${totalItems}`;
      prevBtn.disabled = currentPage === 1;
      nextBtn.disabled = endIndex >= totalItems;

      // If no users, show message
      if (totalItems === 0) {
        tableBody.innerHTML = '<tr><td colspan="' + (stages.length + 1) + '" class="error-message">No non-admin users available.</td></tr>';
        paginationSection.style.display = 'none';
      }

      updateHeight();
    }

    // Download table data as CSV
    function downloadCSV() {
      // Prepare CSV headers
      const headers = ['User', ...stages.map(stage => stage.name)];
      const csvRows = [headers];

      // Prepare CSV data
      const opportunityCounts = new Map();
      usersMap.forEach((name, userId) => {
        opportunityCounts.set(userId, new Map(stages.map(s => [s.id, 0])));
      });

      opportunities.forEach(op => {
        const userId = op.assignedTo;
        const stageId = op.pipelineStageId;
        if (userId && stageId && opportunityCounts.has(userId) && opportunityCounts.get(userId).has(stageId)) {
          opportunityCounts.get(userId).set(stageId, opportunityCounts.get(userId).get(stageId) + 1);
        }
      });

      usersMap.forEach((name, userId) => {
        const row = [name, ...stages.map(stage => opportunityCounts.get(userId).get(stage.id) || 0)];
        csvRows.push(row);
      });

      // Convert to CSV string
      const csvString = csvRows.map(row => row.map(cell => `"${cell}"`).join(',')).join('\n');

      // Create and trigger download
      const blob = new Blob([csvString], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.setAttribute('href', url);
      link.setAttribute('download', 'opportunities_by_user_and_stage.csv');
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    }

    // Update widget height
    function updateHeight() {
      const height = document.documentElement.scrollHeight;
      try {
        window.parent.postMessage({ type: 'setHeight', height: height }, '*');
      } catch (e) {
        console.log("Parent communication not available");
      }
    }

    // Handle parent messages
    window.addEventListener('message', function(event) {
      if (event.data.type === 'ping') {
        updateHeight();
      }
    });
  </script>
</body>
</html>
