<!-- summary of lead counts and 'Won' conversion rates per project, while cross-referencing pipeline stages with real-time conversation data (last message type) to audit agent outreach efficiency. */ -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GHL Lead Summary Table (Won Status)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root{
      --primary:#91AEC4;
      --border:#d1d5db;
      --text:#374151;
      --bg:#f8fafc;
      --success:#10b981;
      --warning:#f59e0b;
    }
    body{font-family:'Cem Seui',Tahoma,sans-serif;background:#fff;margin:0;padding:15px;}
    .widget{max-width:1300px;margin:auto;padding:15px;position:relative;}
    .pipeline-select{margin-bottom:20px;}
    .lead-table th{background:#f8f9fa;font-weight:600;font-size:13px;padding:10px;border-bottom:2px solid #e5e7eb;}
    .lead-table td{font-size:13px;padding:10px;border-top:1px solid #e5e7eb;vertical-align:top;}
    .lead-table tbody tr:hover{background:#f1f5f9;}
    .badge-clickable{
      cursor:pointer;
      transition:all .2s;
      padding:6px 10px;
      font-size:13px;
      border-radius:6px;
    }
    .badge-clickable:hover{opacity:0.8;transform:scale(1.05);}
    .badge-total{background:var(--primary);color:white;}
    .badge-won{background:var(--success);color:white;}
    .badge-rate{background:var(--warning);color:white;}
    .message-type-badge{
      display:inline-block;
      padding:4px 8px;
      background:#e0e7ff;
      color:#3730a3;
      border-radius:4px;
      font-size:11px;
      margin:2px;
      white-space:nowrap;
    }
    .spinner{width:40px;height:40px;border:4px solid #f3f3f3;border-top:4px solid var(--primary);border-radius:50%;animation:s 1s linear infinite;}
    @keyframes s{to{transform:rotate(360deg)}}
    .loading-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,.8);display:flex;align-items:center;justify-content:center;z-index:1000;}
    .modal-body .table-container{max-height:65vh;overflow:auto;}
    .modal-header .btn-close{position:absolute;right:1rem;top:1rem;}
    .modal-table th{background:#f8f9fa;font-weight:600;font-size:13px;padding:8px;}
    .modal-table td{font-size:13px;padding:8px;}
    .stage-cell{min-width:120px;}
  </style>
</head>
<body>
<div class="widget">
  <!-- PIPELINE SELECTOR -->
  <div class="pipeline-select">
    <label for="pipeline" class="form-label fw-bold">Pipeline</label>
    <select id="pipeline" class="form-select w-auto"></select>
  </div>

  <!-- MAIN TABLE -->
  <div id="table-container"></div>

  <!-- GLOBAL LOADER -->
  <div class="loading-overlay" id="globalLoader" style="display:none;">
    <div class="spinner"></div>
  </div>
</div>

<!-- DETAILS MODAL -->
<div class="modal fade" id="detailsModal" tabindex="-1">
  <div class="modal-dialog modal-xl">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle">Lead Details</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="table-container">
          <table class="table table-sm modal-table">
            <thead>
              <tr>
                <th>Opportunity ID</th>
                <th>Opportunity Name</th>
                <th>Primary Contact Name</th>
                <th>Source</th>
                <th>Assigned User</th>
                <th>Status</th>
                <th>Phone Number</th>
                <th>Lead Value</th>
                <th>Project</th>
                <th>Contact Created</th>
                <th>Team</th>
                <th>Conversation ID</th>
                <th>Last Message Type</th>
                <th>Last Message Date</th>
              </tr>
            </thead>
            <tbody id="modalTableBody"></tbody>
          </table>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  import {
    loadConfig,
    fetchPipelinesV2,
    fetchAllUsers,
    fetchAllOpportunities,
    formatDateTimeWithOffset
  } from '../ghlDataV3.js?v=2.0.0';

  // -------------------------------------------------
  // 1. Get locationId from URL
  // -------------------------------------------------
  function getLocationIdFromUrl() {
    const params = new URLSearchParams(window.location.search);
    return params.get('locationId');
  }

  const LAMBDA_BASE_URL = 'https://riedh3l031.execute-api.ap-southeast-1.amazonaws.com';
  const LAMBDA_API_KEY  = '2d291f00-5145-4a2d-b1d8-ff13fd661f28';
  const lambdaFetch = (path, opts = {}) => fetch(`${LAMBDA_BASE_URL}${path}`, {
    ...opts,
    headers: { 'X-Api-Key': LAMBDA_API_KEY, 'Content-Type': 'application/json', ...opts.headers }
  });

  let CONFIG = {}, locationId = '';
  let pipelines = [], usersMap = new Map(), stagesMap = new Map();
  let currentPipelineId = null, oppCache = [];
  let contactsCache = [], conversationsCache = [];
  let currentFilter = {};
  let modalInstance = null;
  let conversationsByContactId = new Map(); // Map contactId -> conversation

  const globalLoader   = document.getElementById('globalLoader');
  const pipelineSelect = document.getElementById('pipeline');
  const modalTitle     = document.getElementById('modalTitle');
  const modalTableBody = document.getElementById('modalTableBody');

  const PROJECT_FIELD_ID = 'QarlIsdnEep18DvcsfK0'; // Adjust if your project custom field ID differs

  // -------------------------------------------------
  // 2. Get project from opp (updated to extract from customFields if not set)
  // -------------------------------------------------
  function getProjectFromOpp(opp) {
    if (opp.project) return opp.project;
    const projectField = opp.customFields?.find(cf => cf.id === PROJECT_FIELD_ID);
    return projectField?.fieldValue || projectField?.value || 'Unknown';
  }

  // -------------------------------------------------
  // 3. Extract phone from contact or relations
  // -------------------------------------------------
  function getPhoneFromOpp(opp) {
    if (opp.contact?.phone) return opp.contact.phone;
    if (opp.relations?.[0]?.phone) return opp.relations[0].phone;
    return 'N/A';
  }

  // -------------------------------------------------
  // 4. Fetch Contacts
  // -------------------------------------------------
  async function fetchAllContacts(config, locationId) {
    let contacts = [];
    let searchAfter = null;
    const limit = 100;

    while (true) {
      const body = { pageLimit: limit };
      if (searchAfter) body.searchAfter = searchAfter;

      const response = await lambdaFetch(`/ghl/contacts/search?locationId=${locationId}`, {
        method: 'POST',
        body: JSON.stringify(body)
      });

      if (!response.ok) throw new Error(`Contacts API error: ${response.status}`);

      const data = await response.json();
      const batch = data.contacts || [];
      if (batch.length === 0) break;

      contacts = contacts.concat(batch);
      if (batch.length < limit) break;

      const last = batch[batch.length - 1];
      if (!last.searchAfter) break;
      searchAfter = last.searchAfter;
    }
    console.log(`Fetched ${contacts.length} contacts.`);
    return contacts;
  }

  // -------------------------------------------------
  // 5. Fetch Conversations
  // -------------------------------------------------
  async function fetchAllConversations(config, locationId) {
    const params = new URLSearchParams({
      locationId,
      limit: '100',
      sort: 'desc',
      sortBy: 'last_message_date'
    });
    const response = await lambdaFetch(`/ghl/conversations?${params.toString()}`);
    if (!response.ok) {
      const err = await response.text();
      throw new Error(`Conversations API error: ${response.status} – ${err}`);
    }
    const data = await response.json();
    const conversations = data.conversations || [];
    console.log(`Fetched ${conversations.length} conversations.`);
    return conversations;
  }

  // -------------------------------------------------
  // 6. UI helpers
  // -------------------------------------------------
  function showLoader()  { globalLoader.style.display = 'flex'; }
  function hideLoader()  { globalLoader.style.display = 'none'; }

  // -------------------------------------------------
  // 7. Modal functions
  // -------------------------------------------------
  function initModal() {
    const modalEl = document.getElementById('detailsModal');
    if (!modalEl) {
      console.error('Modal element not found!');
      return;
    }
    modalInstance = new bootstrap.Modal(modalEl, { backdrop: 'static' });
  }

  function showDetails(filter) {
    if (!modalInstance) {
      console.error('Modal instance not ready');
      return;
    }
    currentFilter = filter;
    modalTitle.textContent = filter.title;
    renderModalTable();
    modalInstance.show();
  }

  function renderModalTable() {
    const filtered = oppCache.filter(op => {
      if (currentFilter.project && getProjectFromOpp(op) !== currentFilter.project) return false;
      if (currentFilter.status && op.status !== currentFilter.status) return false;
      if (currentFilter.stageId && op.pipelineStageId !== currentFilter.stageId) return false;
      if (currentFilter.messageType) {
        const conv = conversationsByContactId.get(op.contactId);
        if (currentFilter.messageType === 'Uncontacted') {
          if (conv && conv.lastMessageType) return false;
        } else {
          if (!conv || conv.lastMessageType !== currentFilter.messageType) return false;
        }
      }
      return true;
    });

    console.log('Filtered opportunities:', filtered.length); // Debug: Check why empty

    // Sort by contact created date (latest first)
    filtered.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

    modalTableBody.innerHTML = '';
    filtered.forEach(op => {
      const assignedName = usersMap.get(op.assignedTo) || 'Unassigned';
      const contactName  = op.contact?.name || op.name || 'N/A';
      const phone        = getPhoneFromOpp(op);
      const created      = formatDateTimeWithOffset(op.createdAt);
      const project      = getProjectFromOpp(op);
      
      // Get conversation details
      const conv = conversationsByContactId.get(op.contactId);
      const convId = conv?.id || 'N/A';
      const lastMessageType = conv?.lastMessageType ? formatMessageType(conv.lastMessageType) : 'Uncontacted';
      const lastMessageDate = conv?.lastMessageDate ? formatDateTimeWithOffset(new Date(conv.lastMessageDate).toISOString()) : 'N/A';
      
      const row = document.createElement('tr');
      row.innerHTML = `
        <td class="text-muted small">${op.id}</td>
        <td>${op.name || 'N/A'}</td>
        <td>${contactName}</td>
        <td>${op.source || 'N/A'}</td>
        <td>${assignedName}</td>
        <td><span class="badge bg-${op.status==='won'?'success':'secondary'}">${op.status}</span></td>
        <td>${phone}</td>
        <td>RM ${op.monetaryValue || 0}</td>
        <td>${project}</td>
        <td class="text-muted small">${created}</td>
        <td>${op.team || 'N/A'}</td>
        <td class="text-muted small">${convId}</td>
        <td><span class="badge bg-info">${lastMessageType}</span></td>
        <td class="text-muted small">${lastMessageDate}</td>
      `;
      modalTableBody.appendChild(row);
    });
  }

  // -------------------------------------------------
  // 8. Init
  // -------------------------------------------------
  async function init() {
    showLoader();
    try {
      locationId = getLocationIdFromUrl();
      if (!locationId) {
        document.getElementById('table-container').innerHTML = '<p class="text-danger">Error: locationId not found in URL.</p>';
        hideLoader();
        return;
      }

      const { config } = await loadConfig();
      if (!config) throw new Error('No config');
      CONFIG = config;

      pipelines = await fetchPipelinesV2(CONFIG, locationId);
      const users = await fetchAllUsers(CONFIG, locationId);
      usersMap = new Map(users.map(u => [u.id, u.name]));

      // Fetch contacts and conversations
      contactsCache = await fetchAllContacts(CONFIG, locationId);
      conversationsCache = await fetchAllConversations(CONFIG, locationId);

      // Build conversation map for quick lookup
      conversationsByContactId = new Map(
        conversationsCache.map(conv => [conv.contactId, conv])
      );

      pipelines.forEach(p => {
        const o = document.createElement('option');
        o.value = p.id;
        o.textContent = p.name;
        pipelineSelect.appendChild(o);
      });

      if (pipelines.length) pipelineSelect.value = pipelines[0].id;
      pipelineSelect.addEventListener('change', renderTable);

      initModal();

      await renderTable();
    } catch (e) {
      console.error(e);
      document.getElementById('table-container').innerHTML = '<p class="text-danger">Failed to load data.</p>';
    } finally {
      hideLoader();
    }
  }

  // -------------------------------------------------
  // 9. Get project-specific conversation breakdown (updated with debug logs)
  // -------------------------------------------------
  function getProjectConversationBreakdown(pipelineId) {
    const projectBreakdown = new Map(); // project -> stageId -> messageType -> count
    const globalTypesByStage = new Map(); // stageId -> Set of messageTypes (for header)

    // Build contactToInfo from oppCache (only for this pipeline)
    const contactToInfo = new Map();
    oppCache.forEach(opp => {
      if (opp.pipelineId === pipelineId) {
        contactToInfo.set(opp.contactId, {
          stageId: opp.pipelineStageId,
          project: getProjectFromOpp(opp)
        });
      }
    });

    // Debug counters
    let matchedConv = 0;
    let nullTypeCount = 0;
    let uncontactedCount = 0;

    // Process contacted (conversations)
    conversationsCache.forEach(conv => {
      const info = contactToInfo.get(conv.contactId);
      if (!info) return; // Contact not in this pipeline
      matchedConv++; // Matched a conv to an opp

      const { stageId, project } = info;
      let messageType = conv.lastMessageType || 'Uncontacted'; // Treat missing as uncontacted
      if (!conv.lastMessageType) nullTypeCount++; // Count null types

      if (!projectBreakdown.has(project)) projectBreakdown.set(project, new Map());
      const stageMap = projectBreakdown.get(project);
      if (!stageMap.has(stageId)) stageMap.set(stageId, new Map());
      const typeMap = stageMap.get(stageId);
      typeMap.set(messageType, (typeMap.get(messageType) || 0) + 1);

      if (!globalTypesByStage.has(stageId)) globalTypesByStage.set(stageId, new Set());
      globalTypesByStage.get(stageId).add(messageType);
    });

    // Process uncontacted (opps without conversations)
    oppCache.forEach(opp => {
      if (opp.pipelineId !== pipelineId) return;
      if (conversationsByContactId.has(opp.contactId)) return; // Already contacted

      uncontactedCount++; // Count pure uncontacted

      const project = getProjectFromOpp(opp);
      const stageId = opp.pipelineStageId;
      const messageType = 'Uncontacted';

      if (!projectBreakdown.has(project)) projectBreakdown.set(project, new Map());
      const stageMap = projectBreakdown.get(project);
      if (!stageMap.has(stageId)) stageMap.set(stageId, new Map());
      const typeMap = stageMap.get(stageId);
      typeMap.set(messageType, (typeMap.get(messageType) || 0) + 1);

      if (!globalTypesByStage.has(stageId)) globalTypesByStage.set(stageId, new Set());
      globalTypesByStage.get(stageId).add(messageType);
    });

    // Debug logs (check browser console after table render)
    console.log(`Debug for pipeline ${pipelineId}:`);
    console.log(`Total opportunities in pipeline: ${oppCache.length}`);
    console.log(`Matched conversations (linked to opps): ${matchedConv}`);
    console.log(`Matched conv with null lastMessageType (treated as Uncontacted): ${nullTypeCount}`);
    console.log(`Uncontacted leads (no conversation at all): ${uncontactedCount}`);
    console.log('Project breakdown:', Array.from(projectBreakdown.entries()).map(([proj, stages]) => ({
      project: proj,
      stages: Array.from(stages.entries()).map(([stage, types]) => ({
        stage,
        types: Array.from(types.entries())
      }))
    })));

    return { projectBreakdown, globalTypesByStage };
  }

  // -------------------------------------------------
  // 10. Render main table (updated)
  // -------------------------------------------------
  async function renderTable() {
    showLoader();
    const pipelineId = pipelineSelect.value;
    if (!pipelineId) { hideLoader(); return; }

    let opps;
    if (pipelineId === currentPipelineId && oppCache.length) {
      opps = oppCache;
    } else {
      opps = await fetchAllOpportunities(CONFIG, locationId, pipelineId, false);
      // Explicitly set project on each opp (in case not set by ghlData.js)
      opps.forEach(opp => {
        opp.project = getProjectFromOpp(opp);
      });
      oppCache = opps;
      currentPipelineId = pipelineId;
    }

    // Get pipeline stages
    const currentPipeline = pipelines.find(p => p.id === pipelineId);
    const stages = currentPipeline?.stages || [];
    
    // Build stages map
    stagesMap = new Map(stages.map(s => [s.id, s.name]));

    // Get project-specific conversation breakdown
    const { projectBreakdown, globalTypesByStage } = getProjectConversationBreakdown(pipelineId);

    // ---- group by project ----
    const projects = new Set();
    const projData = {};

    opps.forEach(op => {
      const proj = getProjectFromOpp(op);
      projects.add(proj);
      if (!projData[proj]) projData[proj] = { total: 0, won: 0 };
      projData[proj].total++;
      if (op.status === 'won') projData[proj].won++;
    });

    const projectList = Array.from(projects).sort();

    // ---- totals ----
    const totalLeads = opps.length;
    const totalWon   = opps.filter(o => o.status === 'won').length;
    const totalRate  = totalLeads ? ((totalWon / totalLeads) * 100).toFixed(2) : '0.00';

    // ---- per-project rows ----
    const rows = projectList.map(p => {
      const d = projData[p];
      const rate = d.total ? ((d.won / d.total) * 100).toFixed(2) : '0.00';
      return { proj: p, total: d.total, won: d.won, rate };
    });

    // ---- build table HTML ----
    const tableEl = document.createElement('table');
    tableEl.className = 'table lead-table';
    
    const numStages = stages.length;

    // Build header
    const thead = document.createElement('thead');
    
    // Row 1: Project | Lead Summary | Stages
    const headerRow1 = document.createElement('tr');
    headerRow1.innerHTML = `
      <th rowspan="3" style="vertical-align:middle;width:200px;">Project</th>
      <th colspan="3" class="text-center bg-light">Lead Summary</th>
      ${numStages > 0 ? `<th colspan="${numStages}" class="text-center bg-light">Stages</th>` : ''}
    `;
    thead.appendChild(headerRow1);

    // Row 2: Total Leads | Converted | Conversion Rate | Stage Names
    const headerRow2 = document.createElement('tr');
    headerRow2.innerHTML = `
      <th class="text-center" rowspan="2">Total Leads</th>
      <th class="text-center" rowspan="2">Converted (Won)</th>
      <th class="text-center" rowspan="2">Conversion Rate</th>
      ${stages.map(s => `<th class="text-center stage-cell">${s.name}</th>`).join('')}
    `;
    thead.appendChild(headerRow2);

    // Row 3: Message Type Labels under each stage (global unique types)
    const headerRow3 = document.createElement('tr');
    headerRow3.innerHTML = stages.map(s => {
      const typesSet = globalTypesByStage.get(s.id) || new Set();
      const types = Array.from(typesSet).map(formatMessageType).join(', ');
      return `<th class="text-center stage-cell" style="font-size:10px;color:#6b7280;">${types || 'No conversations'}</th>`;
    }).join('');
    thead.appendChild(headerRow3);

    tableEl.appendChild(thead);

    // Build body
    const tbody = document.createElement('tbody');

    // Total row
    const totalRow = document.createElement('tr');
    totalRow.style.fontWeight = '600';
    totalRow.style.background = '#f8f9fa';
    
    const totalRowHTML = `
      <td><strong>Total</strong></td>
      <td class="text-center"></td>
      <td class="text-center"></td>
      <td class="text-center"></td>
      ${stages.map(s => '<td class="text-center stage-cell"></td>').join('')}
    `;
    totalRow.innerHTML = totalRowHTML;
    
    const totalBadge = createBadge(totalLeads, 'total', { title: 'All Leads', status: null, project: null });
    const totalWonBadge = createBadge(totalWon, 'won', { title: 'Won Leads', status: 'won', project: null });
    
    totalRow.children[1].appendChild(totalBadge);
    totalRow.children[2].appendChild(totalWonBadge);
    totalRow.children[3].textContent = totalRate + '%';
    
    // Add aggregated stage conversation counts for total row
    stages.forEach((stage, idx) => {
      const cell = totalRow.children[4 + idx];
      const typeCounts = new Map();
      projectList.forEach(proj => {
        const stageMap = projectBreakdown.get(proj);
        if (stageMap) {
          const typeMap = stageMap.get(stage.id);
          if (typeMap) {
            typeMap.forEach((count, type) => {
              typeCounts.set(type, (typeCounts.get(type) || 0) + count);
            });
          }
        }
      });
      if (typeCounts.size > 0) {
        typeCounts.forEach((count, type) => {
          const badge = createMessageTypeBadge(
            `${formatMessageType(type)}: ${count}`,
            { 
              title: `${stagesMap.get(stage.id)} - ${formatMessageType(type)}`,
              stageId: stage.id,
              messageType: type,
              project: null
            }
          );
          cell.appendChild(badge);
          cell.appendChild(document.createElement('br'));
        });
      } else {
        cell.textContent = '-';
      }
    });
    
    tbody.appendChild(totalRow);

    // Project rows
    rows.forEach(r => {
      const row = document.createElement('tr');
      row.innerHTML = `
        <td>${r.proj}</td>
        <td class="text-center"></td>
        <td class="text-center"></td>
        <td class="text-center"></td>
        ${stages.map(s => '<td class="text-center stage-cell"></td>').join('')}
      `;
      
      const totalBadge = createBadge(r.total, 'total', { title: r.proj + ' - All Leads', project: r.proj });
      const wonBadge = createBadge(r.won, 'won', { title: r.proj + ' - Won Leads', status: 'won', project: r.proj });
      
      row.children[1].appendChild(totalBadge);
      row.children[2].appendChild(wonBadge);
      row.children[3].textContent = r.rate + '%';
      
      // Add project-specific stage conversation counts
      const stageMap = projectBreakdown.get(r.proj);
      stages.forEach((stage, idx) => {
        const cell = row.children[4 + idx];
        if (stageMap) {
          const typeMap = stageMap.get(stage.id);
          if (typeMap && typeMap.size > 0) {
            typeMap.forEach((count, type) => {
              const badge = createMessageTypeBadge(
                `${formatMessageType(type)}: ${count}`,
                { 
                  title: `${r.proj} - ${stagesMap.get(stage.id)} - ${formatMessageType(type)}`,
                  stageId: stage.id,
                  messageType: type,
                  project: r.proj
                }
              );
              cell.appendChild(badge);
              cell.appendChild(document.createElement('br'));
            });
          } else {
            cell.textContent = '-';
          }
        } else {
          cell.textContent = '-';
        }
      });
      
      tbody.appendChild(row);
    });

    tableEl.appendChild(tbody);

    const container = document.getElementById('table-container');
    container.innerHTML = '';
    container.appendChild(tableEl);

    hideLoader();
  }

  // -------------------------------------------------
  // 11. Format message type for display (updated for Uncontacted)
  // -------------------------------------------------
  function formatMessageType(type) {
    if (type === 'Uncontacted') return 'Uncontacted';
    return type.replace('TYPE_', '').replace(/_/g, ' ');
  }

  // -------------------------------------------------
  // 12. Create badge with working click handler
  // -------------------------------------------------
  function createBadge(text, type, filterObj) {
    const span = document.createElement('span');
    span.className = `badge-clickable badge-${type} me-1`;
    span.textContent = text;
    span.onclick = () => showDetails(filterObj);
    return span;
  }

  // -------------------------------------------------
  // 13. Create message type badge with click handler
  // -------------------------------------------------
  function createMessageTypeBadge(text, filterObj) {
    const span = document.createElement('span');
    span.className = 'message-type-badge';
    span.style.cursor = 'pointer';
    span.textContent = text;
    span.onclick = () => showDetails(filterObj);
    span.onmouseover = () => span.style.opacity = '0.8';
    span.onmouseout = () => span.style.opacity = '1';
    return span;
  }

  // -------------------------------------------------
  // 14. Start
  // -------------------------------------------------
  document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
